services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
